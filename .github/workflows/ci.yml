name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  build:
    needs: analyse  # не запустится если PHPStan упал
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: prod/app/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/smaulk/linguide:latest
            ghcr.io/smaulk/linguide:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false # Отключаем provenance-аттестации, иначе каждый билд создаёт 2 лишних пакета без тега

  cleanup:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: linguide
          package-type: container
          min-versions-to-keep: 1 # оставляем 1 образ после latest
          ignore-versions: '^latest$'  # тег latest не трогаем