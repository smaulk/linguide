[www]
user = www-data
group = www-data

listen = /run/php/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 10 ; максимум воркеров одновременно
pm.start_servers = 2  ; воркеров при старте контейнера
pm.min_spare_servers = 1 ; минимум свободных (ждущих) воркеров
pm.max_spare_servers = 2 ; максимум свободных (ждущих) воркеров

clear_env = no