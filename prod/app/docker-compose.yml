services:
  backend:
    image: ghcr.io/smaulk/linguide:${TAG}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.linguide.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.linguide.entrypoints=websecure"
      - "traefik.http.routers.linguide.tls.certresolver=letsencrypt"
      - "traefik.http.services.linguide.loadbalancer.server.port=80"
    networks:
      - linguide
      - proxy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - linguide
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      retries: 3
      timeout: 5s

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - linguide
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3
      timeout: 5s

